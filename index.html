<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON OVERDRIVE: CYBER ARENA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a12;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
/**
 * NEON OVERDRIVE: CYBER ARENA
 * Single-file HTML5 Canvas & Web Audio API Game Engine
 */

// ==============================================================================
// CONFIGURATION & CONSTANTS
// ==============================================================================
const GAME_TITLE = "NEON OVERDRIVE";
const TARGET_FPS = 60;
const SAVE_KEY = "neon_overdrive_save_data";

// Color Palette
const COLOR_BG = '#0a0a12';
const COLOR_GRID = '#191c30';
const COLOR_WHITE = '#ffffff';
const COLOR_CYAN = '#00f0ff';
const COLOR_MAGENTA = '#ff0080';
const COLOR_NEON_GREEN = '#32ff64';
const COLOR_YELLOW = '#ffdc00';
const COLOR_ORANGE = '#ff6400';
const COLOR_PURPLE = '#a020f0';
const COLOR_RED = '#ff283c';

// ==============================================================================
// PROCEDURAL SOUND SYNTHESIZER (Web Audio API)
// ==============================================================================
class SoundFXManager {
    constructor() {
        this.ctx = null;
        this.enabled = true;
        this.volume = 0.7;
    }

    init() {
        if (!this.ctx) {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (AudioCtx) this.ctx = new AudioCtx();
        }
        if (this.ctx && this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    }

    play(type) {
        if (!this.enabled) return;
        this.init();
        if (!this.ctx) return;

        const now = this.ctx.currentTime;
        const masterGain = this.ctx.createGain();
        masterGain.gain.setValueAtTime(this.volume, now);
        masterGain.connect(this.ctx.destination);

        switch (type) {
            case 'laser': {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(850, now);
                osc.frequency.exponentialRampToValueAtTime(120, now + 0.12);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(now);
                osc.stop(now + 0.12);
                break;
            }
            case 'explosion': {
                // Noise buffer
                const bufferSize = this.ctx.sampleRate * 0.4;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;

                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(800, now);
                filter.frequency.exponentialRampToValueAtTime(30, now + 0.4);

                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.6, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);
                noise.start(now);
                break;
            }
            case 'hit': {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(60, now + 0.08);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(now);
                osc.stop(now + 0.08);
                break;
            }
            case 'powerup': {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.25);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(now);
                osc.stop(now + 0.25);
                break;
            }
            case 'click': {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1000, now);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.04);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(now);
                osc.stop(now + 0.04);
                break;
            }
            case 'nova': {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.5);
                gain.gain.setValueAtTime(0.6, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(now);
                osc.stop(now + 0.5);
                break;
            }
        }
    }
}

// ==============================================================================
// SAVE SYSTEM
// ==============================================================================
class SaveSystem {
    static loadData() {
        const defaultData = {
            highscore: 0,
            volume: 0.7,
            shake_enabled: true
        };
        try {
            const raw = localStorage.getItem(SAVE_KEY);
            if (raw) return Object.assign(defaultData, JSON.parse(raw));
        } catch (e) { console.warn("Save load failed", e); }
        return defaultData;
    }

    static saveData(data) {
        try {
            localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        } catch (e) { console.warn("Save write failed", e); }
    }
}

// ==============================================================================
// CAMERA & SHAKE SYSTEM
// ==============================================================================
class CameraShake {
    constructor() {
        this.intensity = 0;
        this.decay = 5.0;
        this.offsetX = 0;
        this.offsetY = 0;
        this.enabled = true;
    }

    addShake(amount) {
        if (this.enabled) {
            this.intensity = Math.min(35.0, this.intensity + amount);
        }
    }

    update(dt) {
        if (this.intensity > 0) {
            this.offsetX = (Math.random() * 2 - 1) * this.intensity;
            this.offsetY = (Math.random() * 2 - 1) * this.intensity;
            this.intensity = Math.max(0, this.intensity - this.decay * dt * 10);
        } else {
            this.offsetX = 0;
            this.offsetY = 0;
        }
    }

    getOffset() {
        return { x: this.offsetX, y: this.offsetY };
    }
}

// ==============================================================================
// PARTICLES & FLOATING TEXT
// ==============================================================================
class Particle {
    constructor(x, y, vx, vy, color, radius, lifetime) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.radius = radius;
        this.maxLifetime = lifetime;
        this.lifetime = lifetime;
    }

    update(dt) {
        this.x += this.vx * dt * 60;
        this.y += this.vy * dt * 60;
        this.vx *= 0.96;
        this.vy *= 0.96;
        this.lifetime -= dt;
    }

    draw(ctx, cameraOffset) {
        if (this.lifetime <= 0) return;
        const ratio = this.lifetime / this.maxLifetime;
        const currRadius = Math.max(0.5, this.radius * ratio);
        const px = this.x + cameraOffset.x;
        const py = this.y + cameraOffset.y;

        ctx.save();
        ctx.fillStyle = this.color;
        ctx.globalAlpha = ratio;
        ctx.beginPath();
        ctx.arc(px, py, currRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

class FloatingText {
    constructor(x, y, text, color, font, duration = 1.0) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.font = font;
        this.maxDuration = duration;
        this.duration = duration;
    }

    update(dt) {
        this.y -= 25 * dt;
        this.duration -= dt;
    }

    draw(ctx, cameraOffset) {
        if (this.duration <= 0) return;
        const alpha = Math.max(0, Math.min(1, this.duration / this.maxDuration));
        const px = this.x + cameraOffset.x;
        const py = this.y + cameraOffset.y;

        ctx.save();
        ctx.font = this.font;
        ctx.fillStyle = this.color;
        ctx.globalAlpha = alpha;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.text, px, py);
        ctx.restore();
    }
}

// ==============================================================================
// UI COMPONENTS
// ==============================================================================
class Button {
    constructor(x, y, width, height, text, callback, primaryColor = COLOR_CYAN) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = height;
        this.text = text;
        this.callback = callback;
        this.primaryColor = primaryColor;
        this.isHovered = false;
        this.animHover = 0.0;
    }

    update(dt, mousePos) {
        this.isHovered = (
            mousePos.x >= this.x - this.width / 2 &&
            mousePos.x <= this.x + this.width / 2 &&
            mousePos.y >= this.y - this.height / 2 &&
            mousePos.y <= this.y + this.height / 2
        );
        const target = this.isHovered ? 1.0 : 0.0;
        this.animHover += (target - this.animHover) * 15 * dt;
    }

    handleClick(mousePos, soundMgr) {
        if (this.isHovered) {
            soundMgr.play('click');
            this.callback();
            return true;
        }
        return false;
    }

    draw(ctx) {
        ctx.save();
        const expandedW = this.width + this.animHover * 12;
        const expandedH = this.height + this.animHover * 6;

        ctx.fillStyle = `rgba(15, 20, 35, ${0.5 + this.animHover * 0.3})`;
        ctx.strokeStyle = this.primaryColor;
        ctx.lineWidth = 2 + this.animHover * 2;

        if (this.animHover > 0) {
            ctx.shadowColor = this.primaryColor;
            ctx.shadowBlur = 10 * this.animHover;
        }

        const rectX = this.x - expandedW / 2;
        const rectY = this.y - expandedH / 2;

        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(rectX, rectY, expandedW, expandedH, 6) : ctx.rect(rectX, rectY, expandedW, expandedH);
        ctx.fill();
        ctx.stroke();

        ctx.font = 'bold 18px Arial';
        ctx.fillStyle = this.isHovered ? COLOR_WHITE : this.primaryColor;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.text, this.x, this.y);

        ctx.restore();
    }
}

class Slider {
    constructor(x, y, width, height, label, initialVal, callback) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = height;
        this.label = label;
        this.value = initialVal;
        this.callback = callback;
        this.isDragging = false;
    }

    handleMouseDown(mousePos) {
        if (
            mousePos.x >= this.x - this.width / 2 &&
            mousePos.x <= this.x + this.width / 2 &&
            mousePos.y >= this.y - this.height / 2 &&
            mousePos.y <= this.y + this.height / 2
        ) {
            this.isDragging = true;
            this.updateValue(mousePos.x);
            return true;
        }
        return false;
    }

    handleMouseUp() {
        this.isDragging = false;
    }

    handleMouseMove(mousePos) {
        if (this.isDragging) {
            this.updateValue(mousePos.x);
        }
    }

    updateValue(mouseX) {
        const left = this.x - this.width / 2;
        const relX = mouseX - left;
        this.value = Math.max(0.0, Math.min(1.0, relX / this.width));
        this.callback(this.value);
    }

    draw(ctx) {
        ctx.save();
        const left = this.x - this.width / 2;
        const top = this.y - this.height / 2;

        // Label
        ctx.font = 'bold 16px Arial';
        ctx.fillStyle = COLOR_WHITE;
        ctx.textAlign = 'center';
        ctx.fillText(`${this.label}: ${Math.round(this.value * 100)}%`, this.x, top - 14);

        // Track Background
        ctx.fillStyle = '#1e2337';
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(left, top, this.width, this.height, 4) : ctx.rect(left, top, this.width, this.height);
        ctx.fill();

        // Fill Track
        const fillW = this.width * this.value;
        ctx.fillStyle = COLOR_CYAN;
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(left, top, fillW, this.height, 4) : ctx.rect(left, top, fillW, this.height);
        ctx.fill();

        // Handle
        ctx.fillStyle = COLOR_WHITE;
        ctx.beginPath();
        ctx.arc(left + fillW, this.y, this.height, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }
}

// ==============================================================================
// GAME ENTITIES
// ==============================================================================
class Player {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 18;
        this.angle = 0;
        this.speed = 380;
        this.health = 100;
        this.maxHealth = 100;
        this.shield = 50;
        this.maxShield = 50;
        this.shieldRegenCooldown = 0;

        this.dashCooldown = 0;
        this.dashTimer = 0;
        this.isDashing = false;

        this.novaEnergy = 0.0;
        this.shootCooldown = 0;
        this.weaponLevel = 1;
    }

    handleInput(dt, keys, mousePos) {
        let dx = 0, dy = 0;
        if (keys['KeyW'] || keys['ArrowUp']) dy -= 1;
        if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
        if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
        if (keys['KeyD'] || keys['ArrowRight']) dx += 1;

        const dist = Math.hypot(dx, dy);
        if (dist > 0) {
            dx /= dist;
            dy /= dist;
        }

        const currSpeed = this.speed * (this.isDashing ? 2.2 : 1.0);
        this.x += dx * currSpeed * dt;
        this.y += dy * currSpeed * dt;

        const relX = mousePos.x - this.x;
        const relY = mousePos.y - this.y;
        this.angle = Math.atan2(relY, relX);
    }

    triggerDash(soundMgr, particles) {
        if (this.dashCooldown <= 0) {
            this.isDashing = true;
            this.dashTimer = 0.18;
            this.dashCooldown = 1.2;
            soundMgr.play('laser');

            for (let i = 0; i < 12; i++) {
                particles.push(new Particle(
                    this.x, this.y,
                    (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200,
                    COLOR_CYAN, Math.random() * 4 + 4, 0.3
                ));
            }
        }
    }

    update(dt, bounds) {
        this.x = Math.max(this.radius, Math.min(bounds.width - this.radius, this.x));
        this.y = Math.max(this.radius, Math.min(bounds.height - this.radius, this.y));

        if (this.shootCooldown > 0) this.shootCooldown -= dt;
        if (this.dashCooldown > 0) this.dashCooldown -= dt;
        if (this.dashTimer > 0) {
            this.dashTimer -= dt;
        } else {
            this.isDashing = false;
        }

        if (this.shieldRegenCooldown > 0) {
            this.shieldRegenCooldown -= dt;
        } else if (this.shield < this.maxShield) {
            this.shield = Math.min(this.maxShield, this.shield + 12 * dt);
        }
    }

    takeDamage(amount, camera, soundMgr) {
        if (this.isDashing) return;

        camera.addShake(12);
        soundMgr.play('hit');
        this.shieldRegenCooldown = 3.0;

        if (this.shield > 0) {
            this.shield -= amount;
            if (this.shield < 0) {
                this.health += this.shield;
                this.shield = 0;
            }
        } else {
            this.health -= amount;
        }
    }

    draw(ctx, cameraOffset) {
        const px = this.x + cameraOffset.x;
        const py = this.y + cameraOffset.y;

        ctx.save();
        ctx.translate(px, py);

        // Glow
        const mainColor = this.isDashing ? COLOR_MAGENTA : COLOR_CYAN;
        ctx.shadowColor = mainColor;
        ctx.shadowBlur = 20;

        // Fighter vector shape
        ctx.rotate(this.angle);
        ctx.fillStyle = COLOR_WHITE;
        ctx.strokeStyle = mainColor;
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(22, 0);
        ctx.lineTo(-12, -14);
        ctx.lineTo(-6, 0);
        ctx.lineTo(-12, 14);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.restore();

        // Shield Aura
        if (this.shield > 0) {
            ctx.save();
            ctx.strokeStyle = COLOR_CYAN;
            ctx.globalAlpha = 0.3 + (this.shield / this.maxShield) * 0.5;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(px, py, this.radius + 6, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }
    }
}

class Projectile {
    constructor(x, y, angle, speed = 850, isEnemy = false, damage = 25, color = COLOR_CYAN) {
        this.x = x;
        this.y = y;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.angle = angle;
        this.isEnemy = isEnemy;
        this.damage = damage;
        this.color = color;
        this.radius = 4;
        this.alive = true;
    }

    update(dt, bounds) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        if (this.x < -20 || this.x > bounds.width + 20 || this.y < -20 || this.y > bounds.height + 20) {
            this.alive = false;
        }
    }

    draw(ctx, cameraOffset) {
        const px = this.x + cameraOffset.x;
        const py = this.y + cameraOffset.y;
        const tailX = px - Math.cos(this.angle) * 14;
        const tailY = py - Math.sin(this.angle) * 14;

        ctx.save();
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 8;

        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(tailX, tailY);
        ctx.stroke();

        ctx.restore();
    }
}

class Enemy {
    constructor(x, y, enemyType = 1) {
        this.x = x;
        this.y = y;
        this.enemyType = enemyType;
        this.alive = true;
        this.angle = 0;

        if (enemyType === 1) {
            this.hp = 30; this.maxHp = 30;
            this.speed = 180; this.radius = 14;
            this.color = COLOR_RED; this.scoreValue = 100;
        } else if (enemyType === 2) {
            this.hp = 50; this.maxHp = 50;
            this.speed = 110; this.radius = 18;
            this.color = COLOR_ORANGE; this.shootCooldown = 2.0;
            this.scoreValue = 250;
        } else if (enemyType === 3) {
            this.hp = 160; this.maxHp = 160;
            this.speed = 65; this.radius = 26;
            this.color = COLOR_PURPLE; this.scoreValue = 500;
        } else if (enemyType === 4) {
            this.hp = 1200; this.maxHp = 1200;
            this.speed = 45; this.radius = 50;
            this.color = COLOR_MAGENTA; this.shootCooldown = 1.0;
            this.scoreValue = 5000;
        }
    }

    update(dt, player, projectiles, soundMgr) {
        let dx = player.x - this.x;
        let dy = player.y - this.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 0) { dx /= dist; dy /= dist; }

        this.angle = Math.atan2(dy, dx);

        if (this.enemyType === 1 || this.enemyType === 3) {
            this.x += dx * this.speed * dt;
            this.y += dy * this.speed * dt;
        } else if (this.enemyType === 2) {
            if (dist > 250) {
                this.x += dx * this.speed * dt;
                this.y += dy * this.speed * dt;
            } else if (dist < 150) {
                this.x -= dx * this.speed * dt;
                this.y -= dy * this.speed * dt;
            }
            this.shootCooldown -= dt;
            if (this.shootCooldown <= 0) {
                this.shootCooldown = 2.2;
                projectiles.push(new Projectile(this.x, this.y, this.angle, 400, true, 15, COLOR_ORANGE));
                soundMgr.play('laser');
            }
        } else if (this.enemyType === 4) {
            this.x += dx * this.speed * dt;
            this.y += dy * this.speed * dt;
            this.shootCooldown -= dt;
            if (this.shootCooldown <= 0) {
                this.shootCooldown = 1.2;
                for (let a = 0; a < 8; a++) {
                    const burstAngle = this.angle + (a * Math.PI / 4);
                    projectiles.push(new Projectile(this.x, this.y, burstAngle, 350, true, 20, COLOR_MAGENTA));
                }
                soundMgr.play('laser');
            }
        }
    }

    draw(ctx, cameraOffset) {
        const px = this.x + cameraOffset.x;
        const py = this.y + cameraOffset.y;

        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(this.angle);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 10;

        ctx.beginPath();
        const sides = this.enemyType === 1 ? 4 : (this.enemyType === 2 ? 5 : (this.enemyType === 3 ? 6 : 8));
        for (let i = 0; i < sides; i++) {
            const a = i * (Math.PI * 2 / sides);
            const r = (this.enemyType === 1 && i % 2 !== 0) ? this.radius * 0.7 : this.radius;
            const x = Math.cos(a) * r;
            const y = Math.sin(a) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();

        // Boss & Heavy HP Bar
        if (this.hp < this.maxHp && (this.enemyType === 3 || this.enemyType === 4)) {
            ctx.save();
            const barW = this.radius * 2;
            const barH = 4;
            const healthPct = Math.max(0, this.hp / this.maxHp);

            ctx.fillStyle = '#333';
            ctx.fillRect(px - this.radius, py - this.radius - 12, barW, barH);
            ctx.fillStyle = this.color;
            ctx.fillRect(px - this.radius, py - this.radius - 12, barW * healthPct, barH);
            ctx.restore();
        }
    }
}

class PowerUp {
    constructor(x, y, ptype) {
        this.x = x;
        this.y = y;
        this.ptype = ptype;
        this.radius = 12;
        this.alive = true;
        this.animT = Math.random() * Math.PI * 2;

        if (ptype === 'health') this.color = COLOR_NEON_GREEN;
        else if (ptype === 'shield') this.color = COLOR_CYAN;
        else if (ptype === 'weapon') this.color = COLOR_YELLOW;
        else if (ptype === 'nova') this.color = COLOR_MAGENTA;
    }

    update(dt) {
        this.animT += dt * 4;
    }

    draw(ctx, cameraOffset) {
        const px = this.x + cameraOffset.x;
        const py = this.y + cameraOffset.y + Math.sin(this.animT) * 4;

        ctx.save();
        ctx.fillStyle = COLOR_WHITE;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 12;

        ctx.beginPath();
        ctx.arc(px, py, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.restore();
    }
}

// ==============================================================================
// CORE GAME ENGINE
// ==============================================================================
class NeonOverdriveEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');

        this.saveData = SaveSystem.loadData();
        this.soundMgr = new SoundFXManager();
        this.soundMgr.volume = this.saveData.volume;

        this.camera = new CameraShake();
        this.camera.enabled = this.saveData.shake_enabled;

        this.width = window.innerWidth;
        this.height = window.innerHeight;

        this.state = 'LOADING';
        this.loadingProgress = 0;

        this.score = 0;
        this.highscore = this.saveData.highscore;
        this.multiplier = 1;
        this.comboCount = 0;
        this.comboTimer = 0;
        this.currentLevel = 1;
        this.enemiesKilled = 0;

        this.player = null;
        this.projectiles = [];
        this.enemies = [];
        this.powerups = [];
        this.particles = [];
        this.floatingTexts = [];

        this.keys = {};
        this.mousePos = { x: this.width / 2, y: this.height / 2 };
        this.isMouseDown = false;

        this.uiButtons = {};
        this.uiSliders = {};

        this.stars = Array.from({ length: 120 }, () => ({
            x: Math.random() * this.width,
            y: Math.random() * this.height,
            size: Math.random() * 2 + 0.5
        }));

        this.lastTime = performance.now();
        this.fps = 60;
        this.frameCount = 0;
        this.fpsTimer = performance.now();

        this.initEvents();
        this.resize();
        this.initUI();
    }

    resize() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        this.initUI();
    }

    initUI() {
        const cx = this.width / 2;
        const cy = this.height / 2;

        this.uiButtons['menu_play'] = new Button(cx, cy - 20, 220, 50, "START GAME", () => this.startNewGame(), COLOR_CYAN);
        this.uiButtons['menu_settings'] = new Button(cx, cy + 45, 220, 50, "SETTINGS", () => this.setState('SETTINGS'), COLOR_CYAN);

        this.uiSliders['vol_slider'] = new Slider(cx, cy - 40, 240, 20, "SOUND VOLUME", this.soundMgr.volume, (v) => {
            this.soundMgr.volume = v;
            this.saveData.volume = v;
            SaveSystem.saveData(this.saveData);
        });

        this.uiButtons['toggle_shake'] = new Button(cx, cy + 20, 240, 45, `SHAKE: ${this.camera.enabled ? 'ON' : 'OFF'}`, () => {
            this.camera.enabled = !this.camera.enabled;
            this.uiButtons['toggle_shake'].text = `SHAKE: ${this.camera.enabled ? 'ON' : 'OFF'}`;
            this.saveData.shake_enabled = this.camera.enabled;
            SaveSystem.saveData(this.saveData);
        }, COLOR_CYAN);

        this.uiButtons['toggle_fullscreen'] = new Button(cx, cy + 80, 240, 45, "TOGGLE FULLSCREEN", () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }, COLOR_CYAN);

        this.uiButtons['settings_back'] = new Button(cx, cy + 150, 240, 45, "BACK TO MENU", () => this.setState('MENU'), COLOR_WHITE);

        this.uiButtons['pause_resume'] = new Button(cx, cy - 50, 220, 50, "RESUME", () => this.setState('PLAYING'), COLOR_CYAN);
        this.uiButtons['pause_restart'] = new Button(cx, cy + 15, 220, 50, "RESTART", () => this.startNewGame(), COLOR_YELLOW);
        this.uiButtons['pause_menu'] = new Button(cx, cy + 80, 220, 50, "MAIN MENU", () => this.setState('MENU'), COLOR_RED);

        this.uiButtons['gov_retry'] = new Button(cx, cy + 80, 220, 50, "PLAY AGAIN", () => this.startNewGame(), COLOR_NEON_GREEN);
        this.uiButtons['gov_menu'] = new Button(cx, cy + 145, 220, 50, "MAIN MENU", () => this.setState('MENU'), COLOR_WHITE);
    }

    initEvents() {
        window.addEventListener('resize', () => this.resize());

        window.addEventListener('keydown', (e) => {
            this.keys[e.code] = true;
            this.soundMgr.init();

            if (e.code === 'Escape') {
                if (this.state === 'PLAYING') this.setState('PAUSED');
                else if (this.state === 'PAUSED') this.setState('PLAYING');
                else if (this.state === 'SETTINGS') this.setState('MENU');
            }

            if (this.state === 'PLAYING') {
                if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                    this.player.triggerDash(this.soundMgr, this.particles);
                } else if (e.code === 'KeyE') {
                    this.triggerNova();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            this.keys[e.code] = false;
        });

        window.addEventListener('mousemove', (e) => {
            this.mousePos.x = e.clientX;
            this.mousePos.y = e.clientY;
            for (let slider of Object.values(this.uiSliders)) {
                slider.handleMouseMove(this.mousePos);
            }
        });

        window.addEventListener('mousedown', (e) => {
            this.mousePos.x = e.clientX;
            this.mousePos.y = e.clientY;
            this.isMouseDown = true;
            this.soundMgr.init();

            if (e.button === 2 && this.state === 'PLAYING') {
                this.player.triggerDash(this.soundMgr, this.particles);
            }

            // Click UI
            if (this.state === 'MENU') {
                this.uiButtons['menu_play'].handleClick(this.mousePos, this.soundMgr);
                this.uiButtons['menu_settings'].handleClick(this.mousePos, this.soundMgr);
            } else if (this.state === 'SETTINGS') {
                for (let slider of Object.values(this.uiSliders)) slider.handleMouseDown(this.mousePos);
                this.uiButtons['toggle_shake'].handleClick(this.mousePos, this.soundMgr);
                this.uiButtons['toggle_fullscreen'].handleClick(this.mousePos, this.soundMgr);
                this.uiButtons['settings_back'].handleClick(this.mousePos, this.soundMgr);
            } else if (this.state === 'PAUSED') {
                this.uiButtons['pause_resume'].handleClick(this.mousePos, this.soundMgr);
                this.uiButtons['pause_restart'].handleClick(this.mousePos, this.soundMgr);
                this.uiButtons['pause_menu'].handleClick(this.mousePos, this.soundMgr);
            } else if (this.state === 'GAMEOVER') {
                this.uiButtons['gov_retry'].handleClick(this.mousePos, this.soundMgr);
                this.uiButtons['gov_menu'].handleClick(this.mousePos, this.soundMgr);
            }
        });

        window.addEventListener('mouseup', () => {
            this.isMouseDown = false;
            for (let slider of Object.values(this.uiSliders)) slider.handleMouseUp();
        });

        window.addEventListener('contextmenu', e => e.preventDefault());
    }

    setState(newState) {
        this.state = newState;
        this.soundMgr.play('click');
    }

    startNewGame() {
        this.player = new Player(this.width / 2, this.height / 2);
        this.projectiles = [];
        this.enemies = [];
        this.powerups = [];
        this.particles = [];
        this.floatingTexts = [];

        this.score = 0;
        this.multiplier = 1;
        this.comboCount = 0;
        this.comboTimer = 0;
        this.currentLevel = 1;
        this.enemiesKilled = 0;

        this.spawnWave();
        this.setState('PLAYING');
    }

    spawnWave() {
        const enemyCount = 6 + this.currentLevel * 3;
        const isBossLevel = (this.currentLevel % 3 === 0);

        if (isBossLevel) {
            this.enemies.push(new Enemy(this.width / 2, 100, 4));
            this.floatingTexts.push(new FloatingText(this.width / 2, 160, "BOSS DETECTED!", COLOR_MAGENTA, 'bold 28px Arial', 3.0));
        } else {
            for (let i = 0; i < enemyCount; i++) {
                const side = Math.floor(Math.random() * 4);
                let x, y;
                if (side === 0) { x = Math.random() * this.width; y = -30; }
                else if (side === 1) { x = this.width + 30; y = Math.random() * this.height; }
                else if (side === 2) { x = Math.random() * this.width; y = this.height + 30; }
                else { x = -30; y = Math.random() * this.height; }

                const roll = Math.random();
                let etype = 1;
                if (roll >= 0.6 && roll < 0.85) etype = 2;
                else if (roll >= 0.85) etype = 3;

                this.enemies.push(new Enemy(x, y, etype));
            }
        }
    }

    triggerNova() {
        if (this.player.novaEnergy >= 100.0) {
            this.player.novaEnergy = 0.0;
            this.camera.addShake(25);
            this.soundMgr.play('nova');

            for (let i = 0; i < 72; i++) {
                const a = i * (Math.PI / 36);
                this.particles.push(new Particle(
                    this.player.x, this.player.y,
                    Math.cos(a) * 600, Math.sin(a) * 600,
                    COLOR_MAGENTA, 6, 0.6
                ));
            }

            this.projectiles = this.projectiles.filter(p => !p.isEnemy);

            for (let enemy of this.enemies) {
                const dist = Math.hypot(enemy.x - this.player.x, enemy.y - this.player.y);
                if (dist < 350) {
                    enemy.hp -= 250;
                    if (enemy.hp <= 0) this.handleEnemyDeath(enemy);
                }
            }
        }
    }

    handleEnemyDeath(enemy) {
        enemy.alive = false;
        this.enemiesKilled++;
        this.camera.addShake(enemy.enemyType === 4 ? 20 : 6);
        this.soundMgr.play('explosion');

        this.comboCount++;
        this.comboTimer = 3.0;
        this.multiplier = Math.min(10, 1 + Math.floor(this.comboCount / 5));

        const gained = enemy.scoreValue * this.multiplier;
        this.score += gained;
        this.player.novaEnergy = Math.min(100, this.player.novaEnergy + 12);

        this.floatingTexts.push(new FloatingText(enemy.x, enemy.y, `+${gained}`, COLOR_CYAN, 'bold 18px Arial'));
        if (this.comboCount % 5 === 0) {
            this.floatingTexts.push(new FloatingText(this.player.x, this.player.y - 40, `${this.comboCount}x COMBO!`, COLOR_YELLOW, 'bold 24px Arial'));
        }

        for (let i = 0; i < (enemy.enemyType === 4 ? 50 : 16); i++) {
            this.particles.push(new Particle(
                enemy.x, enemy.y,
                (Math.random() - 0.5) * 400, (Math.random() - 0.5) * 400,
                enemy.color, Math.random() * 4 + 3, Math.random() * 0.4 + 0.3
            ));
        }

        if (Math.random() < 0.22 || enemy.enemyType === 4) {
            const types = ['health', 'shield', 'weapon', 'nova'];
            this.powerups.push(new PowerUp(enemy.x, enemy.y, types[Math.floor(Math.random() * types.length)]));
        }

        if (this.score > this.highscore) {
            this.highscore = this.score;
            this.saveData.highscore = this.highscore;
            SaveSystem.saveData(this.saveData);
        }
    }

    fireWeapon() {
        if (this.player.shootCooldown <= 0) {
            this.player.shootCooldown = 0.12;
            this.soundMgr.play('laser');

            const px = this.player.x, py = this.player.y, a = this.player.angle;
            if (this.player.weaponLevel === 1) {
                this.projectiles.push(new Projectile(px, py, a));
            } else if (this.player.weaponLevel === 2) {
                const offX = Math.cos(a + 1.57) * 8;
                const offY = Math.sin(a + 1.57) * 8;
                this.projectiles.push(new Projectile(px + offX, py + offY, a));
                this.projectiles.push(new Projectile(px - offX, py - offY, a));
            } else {
                this.projectiles.push(new Projectile(px, py, a));
                this.projectiles.push(new Projectile(px, py, a - 0.15));
                this.projectiles.push(new Projectile(px, py, a + 0.15));
            }
        }
    }

    // ==========================================================================
    // UPDATE LOGIC
    // ==========================================================================
    update(dt) {
        this.camera.update(dt);

        for (let star of this.stars) {
            star.y += star.size * 20 * dt;
            if (star.y > this.height) {
                star.y = 0;
                star.x = Math.random() * this.width;
            }
        }

        if (this.state === 'LOADING') {
            this.loadingProgress += dt * 1.5;
            if (this.loadingProgress >= 1.0) this.setState('MENU');
            return;
        }

        if (this.state !== 'PLAYING') {
            for (let btn of Object.values(this.uiButtons)) btn.update(dt, this.mousePos);
            return;
        }

        this.player.handleInput(dt, this.keys, this.mousePos);
        this.player.update(dt, { width: this.width, height: this.height });

        if (this.isMouseDown) this.fireWeapon();

        if (this.comboTimer > 0) {
            this.comboTimer -= dt;
        } else {
            this.comboCount = 0;
            this.multiplier = 1;
        }

        for (let proj of this.projectiles) proj.update(dt, { width: this.width, height: this.height });
        this.projectiles = this.projectiles.filter(p => p.alive);

        for (let p of this.particles) p.update(dt);
        this.particles = this.particles.filter(p => p.lifetime > 0);

        for (let txt of this.floatingTexts) txt.update(dt);
        this.floatingTexts = this.floatingTexts.filter(t => t.duration > 0);

        for (let pow of this.powerups) {
            pow.update(dt);
            if (Math.hypot(pow.x - this.player.x, pow.y - this.player.y) < this.player.radius + pow.radius) {
                this.soundMgr.play('powerup');
                if (pow.ptype === 'health') this.player.health = Math.min(this.player.maxHealth, this.player.health + 35);
                else if (pow.ptype === 'shield') this.player.shield = this.player.maxShield;
                else if (pow.ptype === 'weapon') this.player.weaponLevel = Math.min(3, this.player.weaponLevel + 1);
                else if (pow.ptype === 'nova') this.player.novaEnergy = 100.0;
                pow.alive = false;
            }
        }
        this.powerups = this.powerups.filter(p => p.alive);

        for (let enemy of this.enemies) {
            enemy.update(dt, this.player, this.projectiles, this.soundMgr);

            if (Math.hypot(enemy.x - this.player.x, enemy.y - this.player.y) < enemy.radius + this.player.radius) {
                this.player.takeDamage(25, this.camera, this.soundMgr);
                enemy.hp -= 40;
                if (enemy.hp <= 0) this.handleEnemyDeath(enemy);
            }

            for (let proj of this.projectiles) {
                if (!proj.isEnemy && proj.alive) {
                    if (Math.hypot(enemy.x - proj.x, enemy.y - proj.y) < enemy.radius + proj.radius) {
                        proj.alive = false;
                        enemy.hp -= proj.damage;
                        this.soundMgr.play('hit');

                        for (let i = 0; i < 3; i++) {
                            this.particles.push(new Particle(proj.x, proj.y, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, COLOR_WHITE, 2, 0.2));
                        }

                        if (enemy.hp <= 0) this.handleEnemyDeath(enemy);
                    }
                }
            }
        }
        this.enemies = this.enemies.filter(e => e.alive);

        for (let proj of this.projectiles) {
            if (proj.isEnemy && proj.alive) {
                if (Math.hypot(this.player.x - proj.x, this.player.y - proj.y) < this.player.radius + proj.radius) {
                    proj.alive = false;
                    this.player.takeDamage(proj.damage, this.camera, this.soundMgr);
                }
            }
        }

        if (this.player.health <= 0) {
            this.soundMgr.play('explosion');
            this.camera.addShake(30);
            this.setState('GAMEOVER');
        }

        if (this.enemies.length === 0) {
            this.currentLevel++;
            this.floatingTexts.push(new FloatingText(this.width / 2, this.height / 2 - 50, `LEVEL ${this.currentLevel} CLEAR!`, COLOR_NEON_GREEN, 'bold 32px Arial', 2.5));
            this.spawnWave();
        }
    }

    // ==========================================================================
    // RENDERING
    // ==========================================================================
    drawGrid() {
        this.ctx.fillStyle = COLOR_BG;
        this.ctx.fillRect(0, 0, this.width, this.height);

        const camOff = this.camera.getOffset();

        // Stars
        this.ctx.save();
        for (let star of this.stars) {
            this.ctx.fillStyle = star.size > 1.5 ? '#b4c8ff' : '#505a78';
            this.ctx.beginPath();
            this.ctx.arc((star.x + camOff.x * 0.2) % this.width, (star.y + camOff.y * 0.2) % this.height, star.size, 0, Math.PI * 2);
            this.ctx.fill();
        }
        this.ctx.restore();

        // Grid
        this.ctx.save();
        this.ctx.strokeStyle = COLOR_GRID;
        this.ctx.lineWidth = 1;
        const gridSize = 64;
        const offX = camOff.x % gridSize;
        const offY = camOff.y % gridSize;

        for (let x = offX; x < this.width; x += gridSize) {
            this.ctx.beginPath(); this.ctx.moveTo(x, 0); this.ctx.lineTo(x, this.height); this.ctx.stroke();
        }
        for (let y = offY; y < this.height; y += gridSize) {
            this.ctx.beginPath(); this.ctx.moveTo(0, y); this.ctx.lineTo(this.width, y); this.ctx.stroke();
        }
        this.ctx.restore();
    }

    drawHUD() {
        const camOff = this.camera.getOffset();

        this.ctx.save();
        // Health Bar
        this.ctx.fillStyle = 'rgba(15, 18, 30, 0.8)';
        this.ctx.strokeStyle = COLOR_CYAN;
        this.ctx.lineWidth = 1;
        this.ctx.beginPath();
        this.ctx.roundRect ? this.ctx.roundRect(20 + camOff.x, 20 + camOff.y, 280, 80, 6) : this.ctx.rect(20 + camOff.x, 20 + camOff.y, 280, 80);
        this.ctx.fill();
        this.ctx.stroke();

        // Bars
        const hpPct = Math.max(0, this.player.health / this.player.maxHealth);
        this.ctx.fillStyle = '#320f14';
        this.ctx.fillRect(35 + camOff.x, 35 + camOff.y, 180, 10);
        this.ctx.fillStyle = COLOR_RED;
        this.ctx.fillRect(35 + camOff.x, 35 + camOff.y, 180 * hpPct, 10);

        const spPct = Math.max(0, this.player.shield / this.player.maxShield);
        this.ctx.fillStyle = '#0f1e32';
        this.ctx.fillRect(35 + camOff.x, 52 + camOff.y, 180, 8);
        this.ctx.fillStyle = COLOR_CYAN;
        this.ctx.fillRect(35 + camOff.x, 52 + camOff.y, 180 * spPct, 8);

        const nvPct = Math.max(0, this.player.novaEnergy / 100.0);
        this.ctx.fillStyle = '#280f28';
        this.ctx.fillRect(35 + camOff.x, 66 + camOff.y, 180, 6);
        this.ctx.fillStyle = this.player.novaEnergy >= 100 ? COLOR_MAGENTA : COLOR_PURPLE;
        this.ctx.fillRect(35 + camOff.x, 66 + camOff.y, 180 * nvPct, 6);

        // Score & Level
        this.ctx.font = 'bold 32px Arial';
        this.ctx.fillStyle = COLOR_WHITE;
        this.ctx.textAlign = 'right';
        this.ctx.fillText(this.score.toString().padStart(7, '0'), this.width - 25, 45);

        this.ctx.font = 'bold 18px Arial';
        this.ctx.fillStyle = COLOR_CYAN;
        this.ctx.fillText(`LEVEL ${this.currentLevel}`, this.width - 25, 75);

        if (this.multiplier > 1) {
            this.ctx.font = 'bold 28px Arial';
            this.ctx.fillStyle = COLOR_YELLOW;
            this.ctx.textAlign = 'center';
            this.ctx.fillText(`${this.multiplier}x MULTIPLIER`, this.width / 2, 45);
        }

        // FPS
        this.ctx.font = '12px Consolas';
        this.ctx.fillStyle = COLOR_NEON_GREEN;
        this.ctx.textAlign = 'left';
        this.ctx.fillText(`FPS: ${this.fps}`, 10, this.height - 10);

        this.ctx.restore();
    }

    render() {
        this.drawGrid();
        const camOff = this.camera.getOffset();

        if (this.state === 'LOADING') {
            const cx = this.width / 2, cy = this.height / 2;
            this.ctx.save();
            this.ctx.font = 'bold 56px Impact';
            this.ctx.fillStyle = COLOR_CYAN;
            this.ctx.textAlign = 'center';
            this.ctx.fillText("NEON OVERDRIVE", cx, cy - 60);

            this.ctx.fillStyle = '#1e233c';
            this.ctx.fillRect(cx - 150, cy + 20, 300, 16);
            this.ctx.fillStyle = COLOR_CYAN;
            this.ctx.fillRect(cx - 150, cy + 20, 300 * this.loadingProgress, 16);
            this.ctx.restore();
        } else if (this.state === 'MENU') {
            const cx = this.width / 2, cy = this.height / 2;
            this.ctx.save();
            this.ctx.font = 'bold 64px Impact';
            this.ctx.fillStyle = COLOR_CYAN;
            this.ctx.shadowColor = COLOR_CYAN;
            this.ctx.shadowBlur = 20;
            this.ctx.textAlign = 'center';
            this.ctx.fillText("NEON OVERDRIVE", cx, cy - 140);

            this.ctx.font = 'bold 20px Arial';
            this.ctx.fillStyle = COLOR_YELLOW;
            this.ctx.shadowBlur = 0;
            this.ctx.fillText(`BEST SCORE: ${this.highscore.toString().padStart(7, '0')}`, cx, cy - 70);
            this.ctx.restore();

            this.uiButtons['menu_play'].draw(this.ctx);
            this.uiButtons['menu_settings'].draw(this.ctx);
        } else if (this.state === 'SETTINGS') {
            const cx = this.width / 2, cy = this.height / 2;
            this.ctx.save();
            this.ctx.font = 'bold 32px Arial';
            this.ctx.fillStyle = COLOR_WHITE;
            this.ctx.textAlign = 'center';
            this.ctx.fillText("SYSTEM SETTINGS", cx, cy - 120);
            this.ctx.restore();

            this.uiSliders['vol_slider'].draw(this.ctx);
            this.uiButtons['toggle_shake'].draw(this.ctx);
            this.uiButtons['toggle_fullscreen'].draw(this.ctx);
            this.uiButtons['settings_back'].draw(this.ctx);
        } else if (this.state === 'PLAYING' || this.state === 'PAUSED' || this.state === 'GAMEOVER') {
            for (let pow of this.powerups) pow.draw(this.ctx, camOff);
            for (let enemy of this.enemies) enemy.draw(this.ctx, camOff);
            for (let proj of this.projectiles) proj.draw(this.ctx, camOff);
            if (this.player && this.player.health > 0) this.player.draw(this.ctx, camOff);
            for (let p of this.particles) p.draw(this.ctx, camOff);
            for (let txt of this.floatingTexts) txt.draw(this.ctx, camOff);

            this.drawHUD();

            if (this.state === 'PAUSED') {
                this.ctx.fillStyle = 'rgba(5, 5, 12, 0.75)';
                this.ctx.fillRect(0, 0, this.width, this.height);

                this.ctx.save();
                this.ctx.font = 'bold 36px Arial';
                this.ctx.fillStyle = COLOR_WHITE;
                this.ctx.textAlign = 'center';
                this.ctx.fillText("GAME PAUSED", this.width / 2, this.height / 2 - 120);
                this.ctx.restore();

                this.uiButtons['pause_resume'].draw(this.ctx);
                this.uiButtons['pause_restart'].draw(this.ctx);
                this.uiButtons['pause_menu'].draw(this.ctx);
            } else if (this.state === 'GAMEOVER') {
                this.ctx.fillStyle = 'rgba(20, 5, 10, 0.85)';
                this.ctx.fillRect(0, 0, this.width, this.height);

                const cx = this.width / 2, cy = this.height / 2;
                this.ctx.save();
                this.ctx.font = 'bold 56px Impact';
                this.ctx.fillStyle = COLOR_RED;
                this.ctx.textAlign = 'center';
                this.ctx.fillText("SYSTEM CRASHED", cx, cy - 140);

                this.ctx.font = 'bold 28px Arial';
                this.ctx.fillStyle = COLOR_WHITE;
                this.ctx.fillText(`FINAL SCORE: ${this.score}`, cx, cy - 60);

                this.ctx.font = 'bold 20px Arial';
                this.ctx.fillStyle = COLOR_CYAN;
                this.ctx.fillText(`ENEMIES PURGED: ${this.enemiesKilled}`, cx, cy - 10);
                this.ctx.restore();

                this.uiButtons['gov_retry'].draw(this.ctx);
                this.uiButtons['gov_menu'].draw(this.ctx);
            }
        }
    }

    loop(timestamp) {
        const dt = Math.min(0.05, (timestamp - this.lastTime) / 1000);
        this.lastTime = timestamp;

        this.frameCount++;
        if (timestamp - this.fpsTimer >= 1000) {
            this.fps = this.frameCount;
            this.frameCount = 0;
            this.fpsTimer = timestamp;
        }

        this.update(dt);
        this.render();

        requestAnimationFrame((t) => this.loop(t));
    }

    run() {
        requestAnimationFrame((t) => this.loop(t));
    }
}

// ==============================================================================
// INITIALIZE GAME
// ==============================================================================
window.addEventListener('load', () => {
    const engine = new NeonOverdriveEngine();
    engine.run();
});
</script>
